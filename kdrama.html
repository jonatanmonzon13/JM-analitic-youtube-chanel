<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Drama Novelas IA — JM BOTS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05060C; --bg2:#0B0E18; --bg3:#11141F;
    --ink:#F6F8FE; --body:#C7CEDE; --muted:#828DA6; --line:#222842;
    --gold:#E7B85C; --gold2:#F8DA8E;
    --blue:#4D8DFF; --pink:#FF3D9A; --violet:#9B5CFF; --cyan:#26D9FF; --lime:#5BF08E; --red:#FF4D5E;
    --grad-hot:linear-gradient(100deg,#FF3D9A,#9B5CFF 45%,#26D9FF);
    --display:'Sora',sans-serif; --body-f:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body-f);background:var(--bg);color:var(--body);min-height:100vh;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button{font-family:var(--display);cursor:pointer;border:0;border-radius:10px;transition:all .15s}
  header{background:rgba(5,6,12,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--line);padding:11px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40}
  .back{display:flex;align-items:center;gap:6px;color:var(--muted);font-family:var(--mono);font-size:12px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;white-space:nowrap}
  .back:hover{color:var(--gold);border-color:rgba(231,184,92,.4);background:rgba(231,184,92,.06)}
  .hname{font-family:var(--display);font-weight:700;font-size:15px;flex:1;color:var(--ink)}
  .keychip{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:8px;padding:6px 11px;cursor:pointer}
  .keychip.ok{color:var(--lime);border-color:rgba(91,240,142,.35)}
  .keychip:hover{border-color:var(--gold);color:var(--gold)}
  .layout{max-width:1080px;margin:0 auto;padding:16px;display:grid;grid-template-columns:262px 1fr;gap:16px;align-items:start}
  @media(max-width:780px){.layout{grid-template-columns:1fr}}
  /* Panel de proyectos */
  .side{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px;position:sticky;top:70px}
  @media(max-width:780px){.side{position:static}}
  .side h3{font-family:var(--display);font-size:13px;color:var(--ink);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px}
  .newbtn{width:100%;background:var(--grad-hot);color:#fff;font-weight:700;font-size:13.5px;padding:11px;border-radius:10px;margin-bottom:12px}
  .newbtn:hover{filter:brightness(1.08)}
  .plist{display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow:auto}
  .pcard{border:1px solid var(--line);border-radius:10px;padding:10px;background:var(--bg3)}
  .pcard.active{border-color:var(--gold);box-shadow:0 0 0 1px rgba(231,184,92,.3) inset}
  .pcard .pn{font-family:var(--display);font-weight:600;font-size:13px;color:var(--ink);line-height:1.3;word-break:break-word}
  .pcard .pm{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:4px}
  .pcard .pacts{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
  .pcard .pacts button{font-family:var(--mono);font-size:10.5px;font-weight:700;padding:5px 8px;border:1px solid var(--line);background:transparent;color:var(--body);border-radius:7px}
  .pcard .pacts .go:hover{border-color:var(--gold);color:var(--gold)}
  .pcard .pacts .exp:hover{border-color:var(--cyan);color:var(--cyan)}
  .pcard .pacts .del:hover{border-color:var(--red);color:var(--red)}
  .pempty{font-family:var(--mono);font-size:11.5px;color:var(--muted);text-align:center;padding:22px 8px;line-height:1.6}
  .storebar{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:10px;text-align:center}
  /* Chat */
  .chat{display:flex;flex-direction:column;min-height:72vh}
  .msgs{flex:1;display:flex;flex-direction:column;gap:14px;padding-bottom:14px}
  .intro{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:22px}
  .intro .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
  .intro h1{font-family:var(--display);font-weight:800;font-size:clamp(22px,4vw,30px);color:var(--ink);line-height:1.15;margin-bottom:10px}
  .intro h1 em{font-style:normal;background:var(--grad-hot);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .intro p{font-size:13.5px;color:var(--muted);line-height:1.7;max-width:60ch}
  .intro ul{margin:12px 0 0 0;padding-left:18px;font-size:13px;color:var(--body);line-height:1.8}
  .msg{display:flex;flex-direction:column;gap:4px}
  .msg .who{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .msg.u .bubble{align-self:flex-end;background:var(--bg3);border:1px solid var(--line);max-width:85%}
  .msg.u{align-items:flex-end}
  .bubble{background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:14px 16px;font-size:14px;line-height:1.62;color:var(--body);white-space:pre-wrap;word-break:break-word}
  .loteblock{border:1px solid var(--line);border-radius:11px;overflow:hidden;margin:12px 0}
  .loteblock .lh{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 13px;background:rgba(155,92,255,.12);border-bottom:1px solid var(--line)}
  .loteblock .lh b{font-family:var(--display);font-size:12.5px;color:#c9a6ff}
  .loteblock pre{margin:0;padding:13px;white-space:pre-wrap;word-break:break-word;font-family:var(--mono);font-size:12px;line-height:1.7;color:var(--body)}
  .copyb{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--violet);border:1px solid rgba(155,92,255,.4);background:transparent;border-radius:7px;padding:5px 11px}
  .copyb:hover{background:rgba(155,92,255,.14)}
  .copyb.ok{color:var(--lime);border-color:var(--lime)}
  .typing{font-family:var(--mono);font-size:12.5px;color:var(--gold)}
  .composer{position:sticky;bottom:0;background:linear-gradient(180deg,transparent,var(--bg) 26%);padding-top:10px}
  .cbar{display:flex;gap:9px;align-items:flex-end;background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:10px}
  .cbar textarea{flex:1;background:transparent;border:0;outline:none;color:var(--ink);font-family:var(--body-f);font-size:15px;resize:none;max-height:140px;line-height:1.5}
  .cbar textarea::placeholder{color:var(--muted)}
  .sendb{background:var(--grad-hot);color:#fff;font-weight:700;font-size:14px;padding:11px 18px;border-radius:11px;flex:none}
  .sendb:disabled{opacity:.45;cursor:wait}
  .quick{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:9px}
  .quick button{font-family:var(--mono);font-size:11.5px;color:var(--body);border:1px solid var(--line);background:var(--bg2);border-radius:999px;padding:6px 12px}
  .quick button:hover{border-color:var(--gold);color:var(--gold)}
  /* Modal clave */
  .ov{position:fixed;inset:0;background:rgba(3,4,8,.85);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:100;padding:18px}
  .ov.open{display:flex}
  .modal{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:22px;max-width:420px;width:100%}
  .modal h3{font-family:var(--display);font-size:16px;color:var(--ink);margin-bottom:6px}
  .modal p{font-size:12.5px;color:var(--muted);margin-bottom:14px;line-height:1.6}
  .modal input{width:100%;background:var(--bg3);border:1px solid var(--line);border-radius:9px;padding:11px 13px;color:var(--ink);font-family:var(--mono);font-size:13px;outline:none;margin-bottom:12px}
  .modal input:focus{border-color:var(--violet)}
  .modal .mb{display:flex;gap:8px;justify-content:flex-end}
  .modal .mb button{font-size:13px;font-weight:700;padding:10px 16px;border-radius:9px}
  .modal .save{background:var(--grad-hot);color:#fff}
  .modal .cancel{background:var(--bg3);border:1px solid var(--line);color:var(--body)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <a href="app.html" class="back">← Volver a la suite</a>
  <div class="hname">🎬 K-Drama Novelas IA</div>
  <div class="keychip" id="keychip" onclick="openKey()">⚙ clave</div>
</header>

<div class="layout">
  <aside class="side">
    <h3>📚 Mis novelas</h3>
    <button class="newbtn" onclick="nuevaNovela()">+ Nueva novela</button>
    <div class="plist" id="plist"></div>
    <div class="storebar" id="storebar"></div>
  </aside>

  <main class="chat">
    <div class="msgs" id="msgs"></div>
    <div class="composer">
      <div class="quick" id="quick"></div>
      <div class="cbar">
        <textarea id="inp" rows="1" placeholder="Escribí acá... (ej: «dame las novelas», «quiero la 3», «creá el capítulo 1»)"></textarea>
        <button class="sendb" id="sendb" onclick="enviar()">Enviar</button>
      </div>
    </div>
  </main>
</div>

<div class="ov" id="keyov">
  <div class="modal">
    <h3>Clave de Gemini (gratis)</h3>
    <p>Se comparte con toda la suite. Conseguila gratis en <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener" style="color:var(--cyan)">aistudio.google.com/apikey ↗</a></p>
    <input type="password" id="keyinp" placeholder="AIza..." autocomplete="off">
    <div class="mb">
      <button class="cancel" onclick="closeKey()">Cancelar</button>
      <button class="save" onclick="saveKey()">Guardar</button>
    </div>
  </div>
</div>

<script>
/* ════════ Config ════════ */
const MODEL = 'gemini-2.5-flash';
const API   = 'https://generativelanguage.googleapis.com';
const LS_PROJ = 'jmbots_kdrama_projects';
const $ = id => document.getElementById(id);

/* ════════ Clave (compartida con la suite) ════════ */
function loadKeys(){ try{ return JSON.parse(localStorage.getItem('jmbots_keys')||'{}'); }catch(e){ return {}; } }
function getKey(){ return (loadKeys().an||'').trim(); }
function setKey(v){ try{ const k=loadKeys(); k.an=v; localStorage.setItem('jmbots_keys',JSON.stringify(k)); }catch(e){} }
function refreshKeyChip(){ const c=$('keychip'); if(getKey()){ c.textContent='✓ clave'; c.classList.add('ok'); } else { c.textContent='⚙ clave'; c.classList.remove('ok'); } }
function openKey(){ $('keyinp').value=getKey(); $('keyov').classList.add('open'); }
function closeKey(){ $('keyov').classList.remove('open'); }
function saveKey(){ setKey($('keyinp').value.trim()); refreshKeyChip(); closeKey(); }

/* ════════ SYSTEM (instructivo del productor) ════════ */
const SYS = `Sos un PRODUCTOR DE NOVELAS K-DRAMA hechas con IA, estilo novela coreana real (live-action), dividida en clips verticales para reels. Tu trabajo es producir una novela larga, coherente y continua, como si tomaras un k-drama real y lo dividieras en clips para después rearmarlo.

IDIOMA DE LA CONVERSACIÓN: español latino neutro. Los DIÁLOGOS de los personajes también en español latino neutro.

FLUJO DE TRABAJO (seguilo estrictamente):
1) Cuando el usuario pida empezar o pida novelas, ofrecé 15 TÍTULOS de novela nuevos e inventados, cada uno con un breve resumen de 1 a 2 líneas. Numerados del 1 al 15. No generes lotes todavía. Cerrá preguntando cuál novela elige.
2) Cuando el usuario elija una novela (por número o nombre), creá internamente y mostrá una BIBLIA breve: lista de personajes principales con nombre propio y un resumen del arco general de la trama (la novela debe poder durar mínimo 80 capítulos de 4 a 8 minutos cada uno). Cerrá preguntando qué capítulo quiere crear.
3) Cuando el usuario pida un capítulo (ej: "capítulo 1"), entregá los TRES LOTES JUNTOS de ese capítulo, respetando SIEMPRE la lógica espacio-tiempo y la continuidad con lo ya ocurrido en la novela.

REGLAS DE LOS PERSONAJES:
- Cuantos más personajes con nombre propio, mejor (es una novela coral, no un monólogo).
- Cada personaje SIEMPRE con su NOMBRE PROPIO, y ese nombre DEBE aparecer en CADA prompt donde el personaje aparezca, ejecute una acción o hable. Nunca uses "a man" o "a woman" si el personaje ya tiene nombre.
- Las escenas tienen interacción entre personajes; NUNCA un solo personaje por escena salvo que la escena lo amerite de verdad.
- TODAS las escenas deben tener al menos un personaje nombrado presente. Está PROHIBIDO un plano de puro ambiente sin personaje.

ESTILO VISUAL: realismo total, personas reales tipo K-drama (live-action), foto-realista, iluminación cinematográfica natural. Todo en formato VERTICAL 9:16 (reels). Los prompts van para Veo 3.1.

FORMATO DE SALIDA — entregá los tres lotes así, cada uno bajo su encabezado en MAYÚSCULAS:
"LOTE 1 — PERSONAJES", "LOTE 2 — ESCENAS", "LOTE 3 — ANIMACIÓN CON GUION".
Dentro de cada lote:
- Cada prompt va en UNA SOLA LÍNEA de texto, en prosa en inglés, SIN números, SIN guiones, SIN viñetas, SIN etiquetas de campo, SIN JSON.
- Los prompts se separan entre sí por UNA sola línea en blanco (un enter).

LOTE 1 — PERSONAJES (ficha de referencia / character sheet, fondo blanco):
- Su objetivo es crear la imagen de referencia de cada personaje para mantener su apariencia idéntica en todas las escenas.
- Ultra detallado: edad, contextura y estatura, rostro, rasgos físicos, color y estilo de pelo, marcas/lunares, vestimenta completa, extremidades, manos, posturas, y un estudio de expresiones. Incluir vistas (front view, side view, back view) y close-up de expresiones.
- Cada prompt empieza nombrando al personaje (ej: "Character reference sheet of Soyeon, a 34-year-old...").
- Cada prompt cierra con: plain pure white seamless background, ultra photorealistic natural cinematic lighting, no text no labels no border, high detail 8k, 9:16

LOTE 2 — ESCENAS (foto-realistas, máxima continuidad):
- Cada prompt nombra a los personajes presentes y describe lugar, momento, acción, cámara, luz y emoción, manteniendo ropa/lugar coherentes con la ficha y con escenas anteriores.
- Cada prompt cierra con: ultra photorealistic, natural cinematic lighting, no text no captions no panels no border, 9:16

LOTE 3 — ANIMACIÓN CON GUION (diálogo incluido):
- Una animación por cada escena del Lote 2, en el mismo orden.
- Describe el movimiento/acción y mete el DIÁLOGO en español latino neutro dentro del prompt, citando al personaje por su nombre. Ej: ...Soyeon speaks in neutral Latin American Spanish: "..."
- Incluí realistic lip sync. Cada prompt cierra con: ultra photorealistic, no text no subtitles, 9:16

CAPA ANTI-BLOQUEO DE VEO (muy importante, respetala siempre):
- Veo bloquea por "violencia" cuando combina: persona sola + agua/mar + esfuerzo físico + noche, y también tormentas intensas, peleas, accidentes, gritos de peligro o forcejeos.
- Por eso: describí el peligro/drama en tono CALMO o de día; evitá palabras como violent, crash, brace, smash, fight, blood, shout, struggle. El drama fuerte se INSINÚA en el diálogo/guion, no se muestra como acción peligrosa en la imagen. Si una escena necesita acción cerca del agua, ponela de día y en calma.

Sé ultra detallado, coherente y consistente en todo. No te saltees pasos del flujo.`;

/* ════════ Estado ════════ */
let proyectos = [];
let actual = null;       // proyecto activo
function loadProj(){ try{ proyectos = JSON.parse(localStorage.getItem(LS_PROJ)||'[]'); }catch(e){ proyectos=[]; } }
function saveProj(){ try{ localStorage.setItem(LS_PROJ, JSON.stringify(proyectos)); renderStore(); }catch(e){ alert('No se pudo guardar: el almacenamiento del navegador está lleno. Exportá y borrá alguna novela.'); } }
function renderStore(){
  try{
    const bytes = new Blob([localStorage.getItem(LS_PROJ)||'']).size;
    const kb = (bytes/1024).toFixed(0);
    $('storebar').textContent = proyectos.length + ' novela(s) · ' + kb + ' KB usados';
  }catch(e){ $('storebar').textContent=''; }
}

/* ════════ Proyectos UI ════════ */
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function renderProyectos(){
  const cont = $('plist');
  if(!proyectos.length){ cont.innerHTML='<div class="pempty">Todavía no hay novelas guardadas.<br>Tocá «+ Nueva novela» para empezar.</div>'; renderStore(); return; }
  cont.innerHTML = proyectos.map(p=>{
    const act = (actual && actual.id===p.id) ? ' active' : '';
    const f = new Date(p.lastTs||p.ts).toLocaleDateString('es');
    return '<div class="pcard'+act+'">'
      + '<div class="pn">'+esc(p.nombre||'Novela sin título')+'</div>'
      + '<div class="pm">'+(p.mensajes?p.mensajes.length:0)+' mensajes · '+f+'</div>'
      + '<div class="pacts">'
      +   '<button class="go" onclick="continuar(\''+p.id+'\')">▶ continuar</button>'
      +   '<button class="exp" onclick="exportar(\''+p.id+'\')">⬇ exportar</button>'
      +   '<button class="del" onclick="borrar(\''+p.id+'\')">🗑</button>'
      + '</div></div>';
  }).join('');
  renderStore();
}
function nuevaNovela(){
  const id = 'n'+Date.now();
  actual = { id, nombre:'Novela '+(proyectos.length+1), ts:Date.now(), lastTs:Date.now(), mensajes:[] };
  proyectos.unshift(actual);
  saveProj(); renderProyectos(); renderChat();
  // arranque automático: pedir las 15 novelas
  enviarTexto('Dame las 15 novelas para elegir.');
}
function continuar(id){
  const p = proyectos.find(x=>x.id===id); if(!p) return;
  actual = p; renderProyectos(); renderChat();
  $('msgs').scrollIntoView({block:'end'});
}
function borrar(id){
  if(!confirm('¿Borrar esta novela y todos sus lotes? No se puede deshacer.')) return;
  proyectos = proyectos.filter(x=>x.id!==id);
  if(actual && actual.id===id) actual=null;
  saveProj(); renderProyectos(); renderChat();
}
function exportar(id){
  const p = proyectos.find(x=>x.id===id); if(!p) return;
  let txt = '═══ '+(p.nombre||'Novela')+' ═══\n\n';
  (p.mensajes||[]).forEach(m=>{ txt += (m.role==='user'?'>>> TÚ:\n':'>>> PRODUCTOR:\n') + m.text + '\n\n'; });
  const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  const slug = (p.nombre||'novela').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,40)||'novela';
  a.href = URL.createObjectURL(blob); a.download = 'kdrama-'+slug+'.txt';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

/* ════════ Chat render ════════ */
function autoNombre(p){
  // intenta nombrar la novela con el título elegido por el usuario, si lo detecta
  for(const m of (p.mensajes||[])){
    if(m.role==='model'){
      const mm = m.text.match(/BIBLIA[\s\S]{0,80}?(?:novela|t[ií]tulo)[:\s"]*([^\n"]{3,60})/i);
      if(mm){ return mm[1].trim().replace(/[*"]/g,''); }
    }
  }
  return p.nombre;
}
function splitLotes(text){
  // separa por encabezados LOTE 1/2/3 para botones de copia
  const rx = /(LOTE\s*[123][^\n]*)/gi;
  const idxs = []; let m;
  while((m = rx.exec(text)) !== null){ idxs.push({i:m.index, h:m[1].trim()}); }
  if(idxs.length < 2) return null;
  const blocks = [];
  // texto antes del primer lote
  const pre = text.slice(0, idxs[0].i).trim();
  for(let k=0;k<idxs.length;k++){
    const start = idxs[k].i;
    const end = (k+1<idxs.length) ? idxs[k+1].i : text.length;
    const full = text.slice(start, end).trim();
    const body = full.slice(idxs[k].h.length).replace(/^[\s:—-]+/,'').trim();
    blocks.push({head:idxs[k].h, body});
  }
  return {pre, blocks};
}
function bubbleHtml(text){
  const parsed = splitLotes(text);
  if(!parsed){ return '<div class="bubble">'+esc(text)+'</div>'; }
  let html = '';
  if(parsed.pre) html += '<div class="bubble">'+esc(parsed.pre)+'</div>';
  parsed.blocks.forEach(b=>{
    html += '<div class="loteblock"><div class="lh"><b>'+esc(b.head)+'</b>'
      + '<button class="copyb" onclick="copyLote(this)">copiar</button></div>'
      + '<pre>'+esc(b.body)+'</pre></div>';
  });
  return html;
}
function copyLote(btn){
  const pre = btn.closest('.loteblock').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(()=>{
    btn.textContent='✓ copiado'; btn.classList.add('ok');
    setTimeout(()=>{ btn.textContent='copiar'; btn.classList.remove('ok'); },1500);
  });
}
function renderChat(){
  const cont = $('msgs');
  if(!actual){
    cont.innerHTML = '<div class="intro"><div class="eyebrow">⚡ JM BOTS</div>'
      + '<h1>Productor de <em>Novelas K-Drama</em> con IA</h1>'
      + '<p>Creá novelas estilo K-drama realista (live-action), divididas en clips verticales 9:16 para reels. El bot te da los prompts listos para Veo 3.1: personajes, escenas y animación con guion.</p>'
      + '<ul><li>Te propongo <b>15 novelas</b> con resumen → elegís una.</li><li>Pedís el <b>capítulo</b> que quieras.</li><li>Te entrego los <b>3 lotes juntos</b> (personajes, escenas, animación).</li><li>Cada novela queda guardada para <b>continuarla</b> después.</li></ul>'
      + '<p style="margin-top:14px">Tocá <b>«+ Nueva novela»</b> para empezar.</p></div>';
    setQuick(false); return;
  }
  cont.innerHTML = (actual.mensajes||[]).map(m=>{
    if(m.role==='user') return '<div class="msg u"><div class="who">tú</div><div class="bubble">'+esc(m.text)+'</div></div>';
    return '<div class="msg b"><div class="who">productor</div>'+bubbleHtml(m.text)+'</div>';
  }).join('');
  setQuick(true);
  cont.scrollIntoView({block:'end'});
  window.scrollTo(0,document.body.scrollHeight);
}
function setQuick(on){
  const q = $('quick');
  if(!on || !actual){ q.innerHTML=''; return; }
  q.innerHTML = '<button onclick="quickSend(\'Dame las 15 novelas para elegir.\')">🎬 15 novelas</button>'
    + '<button onclick="quickSend(\'Creá el siguiente capítulo respetando la continuidad.\')">➕ siguiente capítulo</button>'
    + '<button onclick="quickSend(\'Mostrame la biblia de personajes y la trama actual.\')">📖 biblia</button>';
}
function quickSend(t){ $('inp').value=t; enviar(); }

/* ════════ Envío a Gemini ════════ */
let enviando = false;
function enviar(){
  const v = $('inp').value.trim();
  if(!v) return;
  $('inp').value=''; $('inp').style.height='auto';
  enviarTexto(v);
}
async function enviarTexto(v){
  if(enviando) return;
  if(!getKey()){ openKey(); return; }
  if(!actual){ nuevaNovela(); return; }
  enviando = true; $('sendb').disabled = true;
  actual.mensajes.push({role:'user', text:v});
  actual.lastTs = Date.now();
  renderChat(); saveProj();
  // burbuja "escribiendo..."
  const cont = $('msgs');
  const tdiv = document.createElement('div'); tdiv.className='msg b'; tdiv.id='typing';
  tdiv.innerHTML = '<div class="who">productor</div><div class="typing">✍️ escribiendo el capítulo...</div>';
  cont.appendChild(tdiv); window.scrollTo(0,document.body.scrollHeight);
  try{
    const contents = actual.mensajes.map(m=>({ role: (m.role==='user'?'user':'model'), parts:[{text:m.text}] }));
    const r = await fetch(API+'/v1beta/models/'+MODEL+':generateContent?key='+encodeURIComponent(getKey()), {
      method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({
        system_instruction:{ parts:[{ text: SYS }] },
        contents,
        generationConfig:{ maxOutputTokens:16384, temperature:0.95 }
      })
    });
    const data = await r.json();
    if(!r.ok) throw new Error((data.error&&data.error.message)||('Gemini '+r.status));
    const text = ((data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts)||[])
      .map(p=>p.text||'').join('').trim();
    if(!text) throw new Error('respuesta vacía (puede ser el filtro de seguridad). Probá reformular.');
    actual.mensajes.push({role:'model', text});
    actual.lastTs = Date.now();
    actual.nombre = autoNombre(actual) || actual.nombre;
  }catch(e){
    actual.mensajes.push({role:'model', text:'⚠️ Error: '+e.message});
  }finally{
    enviando = false; $('sendb').disabled = false;
    const t=$('typing'); if(t) t.remove();
    saveProj(); renderProyectos(); renderChat();
  }
}

/* ════════ Init ════════ */
$('inp').addEventListener('input', function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,140)+'px'; });
$('inp').addEventListener('keydown', function(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviar(); } });
loadProj(); refreshKeyChip(); renderProyectos(); renderChat();
if(!getKey()) setTimeout(openKey, 400);
</script>
<script src="jmbots-resilience.js"></script>
<script src="apps-menu.js"></script>
