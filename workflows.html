<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workflows IA — JM BOTS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#05060C; --bg2:#0B0E18; --bg3:#11141F;
    --ink:#F6F8FE; --body:#C7CEDE; --muted:#828DA6; --line:#222842;
    --gold:#E7B85C; --gold2:#F8DA8E;
    --blue:#4D8DFF; --pink:#FF3D9A; --violet:#9B5CFF; --cyan:#26D9FF; --lime:#5BF08E;
    --grad-hot:linear-gradient(100deg,#FF3D9A,#9B5CFF 45%,#26D9FF);
    --display:'Sora',sans-serif; --body-f:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body-f);background:var(--bg);color:var(--body);min-height:100vh;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  #overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:900}
  .spinner{width:42px;height:42px;border:3px solid var(--line);border-top-color:var(--violet);border-radius:50%;animation:spin .75s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  header{background:rgba(5,6,12,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--line);padding:12px 22px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:40}
  .back{display:flex;align-items:center;gap:6px;color:var(--muted);font-family:var(--mono);font-size:12px;padding:6px 12px;border:1px solid var(--line);border-radius:8px;transition:all .18s;white-space:nowrap}
  .back:hover{color:var(--gold);border-color:rgba(231,184,92,.4);background:rgba(231,184,92,.06)}
  .header-name{font-family:var(--display);font-weight:700;font-size:15px;flex:1;color:var(--ink)}
  .user-pill{display:flex;align-items:center;gap:7px;padding:5px 12px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:50px;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .udot{width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 6px var(--lime)}
  .wrap{max-width:1100px;margin:0 auto;padding:34px 22px 60px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
  h1{font-family:var(--display);font-weight:800;font-size:clamp(26px,4vw,40px);line-height:1.1;color:var(--ink);margin:0 0 10px}
  h1 em{font-style:normal;background:var(--grad-hot);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{color:var(--muted);font-size:14.5px;max-width:56ch;margin:0 0 22px;line-height:1.7}
  .stats{display:flex;gap:32px;flex-wrap:wrap;margin-bottom:26px}
  .stat .n{font-family:var(--display);font-weight:700;font-size:1.9rem;background:var(--grad-hot);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .stat .l{font-family:var(--mono);font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
  .fbtn{font-family:var(--display);font-weight:700;font-size:13px;cursor:pointer;color:var(--gold);background:transparent;border:1px solid rgba(231,184,92,.4);border-radius:10px;padding:9px 16px;transition:all .15s}
  .fbtn:hover{border-color:var(--gold);background:rgba(231,184,92,.08)}
  .fbtn.on{color:#0A0D14;background:linear-gradient(100deg,var(--gold),var(--gold2));border-color:transparent}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:14px}
  .bcard{background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s,border-color .2s}
  .bcard:hover{transform:translateY(-3px);box-shadow:0 18px 40px rgba(0,0,0,.45);border-color:rgba(155,92,255,.4)}
  .bcard .bar{height:3px}
  .bcard .in{padding:16px;display:flex;flex-direction:column;gap:10px;flex:1}
  .bcard .top{display:flex;align-items:flex-start;justify-content:space-between}
  .bcard .cat{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--line)}
  .bcard .nuevo{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;background:rgba(91,240,142,.12);color:var(--lime);border:1px solid rgba(91,240,142,.3);margin-left:6px}
  .bcard .ico{font-size:1.35rem}
  .bcard h3{font-family:var(--display);font-weight:700;font-size:14.5px;line-height:1.3;color:var(--ink);margin:0}
  .bcard p{font-size:12.5px;color:var(--muted);line-height:1.65;margin:0;flex:1}
  .bcard .open{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:10px;font-family:var(--display);font-size:13px;font-weight:700;color:var(--ink);transition:background .15s}
  .bcard .open:hover{background:rgba(255,255,255,.08)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="overlay"><div class="spinner"></div></div>
<header>
  <a href="app.html" class="back">← Volver a la suite</a>
  <div class="header-name">🔧 Workflows IA</div>
  <div class="user-pill"><div class="udot"></div><span id="uid">...</span></div>
</header>
<div class="wrap">
  <div class="eyebrow">⚡ Exclusivo JM BOTS</div>
  <h1>Biblioteca de <em>Workflows IA</em></h1>
  <p class="sub">Transformá ideas en prompts profesionales con IA real adentro. Sin salir de JM BOTS, sin ChatGPT, sin pagar nada: usa tu clave de Gemini de la suite.</p>
  <div class="stats">
    <div class="stat"><div class="n">8</div><div class="l">Workflows</div></div>
    <div class="stat"><div class="n">5</div><div class="l">Categorías</div></div>
    <div class="stat"><div class="n">IA</div><div class="l">Integrada</div></div>
  </div>
  <div class="filters" id="filters">
    <button class="fbtn on" onclick="filtrar('todo',this)">Todo</button>
    <button class="fbtn" onclick="filtrar('3D Animado',this)">🎬 3D Animado</button>
    <button class="fbtn" onclick="filtrar('Realista',this)">🎥 Realista</button>
    <button class="fbtn" onclick="filtrar('First/Last Frame',this)">🎞️ First/Last Frame</button>
    <button class="fbtn" onclick="filtrar('Generador',this)">🔧 Generador</button>
    <button class="fbtn" onclick="filtrar('General',this)">⚡ General</button>
  </div>
  <div id="grid"></div>
</div>
<script>
const SB_URL  = 'https://filzfaxpzuycxxvvuwbr.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpbHpmYXhwenV5Y3h4dnZ1d2JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMjc5NTUsImV4cCI6MjA5NzYwMzk1NX0.HfhhqWusIKGb_onr0zbe_EE2KqfiEUANStA5SNkmOVY';
let sb=null;
try{ if(window.supabase) sb=window.supabase.createClient(SB_URL,SB_ANON,{auth:{flowType:'implicit',detectSessionInUrl:true,persistSession:true,autoRefreshToken:true}}); }catch(e){ console.warn(e); }
const WF_COLORS={'3D Animado':'#9B5CFF','Realista':'#26D9FF','First/Last Frame':'#E7B85C','Generador':'#5BF08E','General':'#4D8DFF'};
const WF_DATA=[
  {id:'documental3d',nombre:'De Idea a Documental 3D',desc:'Convierte cualquier tema en un documental 3D cinematográfico con estructura narrativa, prompts de imagen, video y narración escena por escena.',cat:'3D Animado',icon:'🎬',nuevo:false},
  {id:'corto3d',nombre:'Cortometraje 3D Animado',desc:'Transforma una idea simple en un corto 3D con espina dorsal emocional, beats con timestamps y prompts por escena.',cat:'3D Animado',icon:'🎭',nuevo:false},
  {id:'expansion3d',nombre:'Expansión 3D con IA',desc:'Expande un concepto 3D en personajes consistentes, lógica emocional y prompts listos para pegar en VideoExpress o Veo 3.',cat:'3D Animado',icon:'✨',nuevo:false},
  {id:'actor',nombre:'Actor IA: Video Realista',desc:'Genera setups cinematográficos, identidad del actor, diálogos naturales y notas de lipsync para videos realistas con IA.',cat:'Realista',icon:'🎥',nuevo:false},
  {id:'escena',nombre:'Construye tu Escena Realista',desc:'Convierte una situación en una escena completa con tensión visual, diálogo natural y dirección de lipsync clara.',cat:'Realista',icon:'🌟',nuevo:false},
  {id:'firstlast',nombre:'Control First / Last Frame',desc:'Dale al generador el inicio, el final y la lógica de transición para que tus escenas no deriven a otra realidad.',cat:'First/Last Frame',icon:'🎞️',nuevo:false},
  {id:'automation',nombre:'Maestro de Automatización',desc:'Planea, construye y mejora flujos de trabajo de video con IA. Basado en 10,000 horas de experiencia real.',cat:'General',icon:'⚡',nuevo:false},
  {id:'generador',nombre:'Generador de GPTs y Gems',desc:'Describí tu idea de bot y recibís el System Prompt completo para ChatGPT GPT Builder y Gemini Gem, con nombre y conversation starters.',cat:'Generador',icon:'🔧',nuevo:true}
];
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function render(data){
  document.getElementById('grid').innerHTML = data.map(function(w){
    var c=WF_COLORS[w.cat]||'#4D8DFF';
    return '<article class="bcard">'
      + '<div class="bar" style="background:'+c+'"></div>'
      + '<div class="in">'
      +   '<div class="top"><div><span class="cat">'+esc(w.cat)+'</span>'+(w.nuevo?'<span class="nuevo">NUEVO</span>':'')+'</div><span class="ico">'+w.icon+'</span></div>'
      +   '<h3>'+esc(w.nombre)+'</h3>'
      +   '<p>'+esc(w.desc)+'</p>'
      +   '<a class="open" href="workflow-bot.html?bot='+encodeURIComponent(w.id)+'"><span>Abrir Bot</span><span>→</span></a>'
      + '</div></article>';
  }).join('');
}
function filtrar(cat,btn){
  document.querySelectorAll('.fbtn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  render(cat==='todo'?WF_DATA:WF_DATA.filter(function(w){ return w.cat===cat; }));
}
async function init(){
  render(WF_DATA);
  try{
    if(sb){
      const { data:{ session } } = await sb.auth.getSession();
      if(!session){ window.location.href='index.html'; return; }
      document.getElementById('uid').textContent = (session.user.email||'').split('@')[0];
    }
  }catch(e){ console.warn('sesion:', e); }
  document.getElementById('overlay').style.display='none';
}
init();
</script>
<script src="apps-menu.js"></script>
</body>
</html>
